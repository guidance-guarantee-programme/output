default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV["DB_POOL"] || ENV['MAX_THREADS'] || 5 %>

development:
  <<: *default
  database: record_of_guidance_development

test:
  <<: *default
  <% if ENV['DATABASE_URL'] %>url: <%= ENV['DATABASE_URL'] %><% end %>
  database: record_of_guidance_test
